<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة هارت سينك 💌</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/animations.css">
</head>

<body class="hero-gradient-bg">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <section class="hero" style="min-height:100vh; display:flex; align-items:center;">
    <div class="hero-content animate-fadeInUp w-100" style="max-width: 420px; margin: 0 auto; width: 100%;">

      <div class="card" style="text-align: center;">
        <div style="font-size:3.5rem; margin-bottom:16px" class="animate-float">💌</div>
        <h1 class="hero-title" style="font-size:1.8rem; margin-bottom:8px">
          <span class="gradient-text">دعوة خاصة</span>
        </h1>

        <p class="text-muted mb-24" style="font-size:0.95rem">لقد تمت دعوتك للانضمام إلى الغرفة التفاعلية!</p>

        <div class="badge badge-active mb-32" style="font-size:1.2rem; padding:8px 16px; letter-spacing:2px;"
          id="room-code-display">
          ------
        </div>

        <div id="loading-auth" class="text-muted text-sm">
          جاري التحقق...
        </div>

        <div id="auth-section" class="hidden">
          <p class="text-sm text-muted mb-16">يجب تسجيل الدخول للانضمام للغرفة</p>
          <button id="google-login-btn" class="btn btn-google btn-block btn-lg">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            تسجيل الدخول بـ Google
          </button>

          <div class="divider-text mt-16 mb-16">
            <span>أو</span>
          </div>

          <div class="form-group mb-8">
            <input type="text" id="guest-name-input" class="form-control" placeholder="اسمك (للدخول كضيف)">
          </div>

          <button id="guest-login-btn" class="btn btn-block"
            style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--text-secondary);font-size:0.95rem;gap:8px">
            👤 دخول كضيف سريع
          </button>
        </div>

      </div>

    </div>
  </section>

  <script type="module">
    import { getSession, signInWithGoogle, signInAsGuest, showToast } from './js/auth.js';

    const params = new URLSearchParams(location.search);
    const roomId = params.get('room');

    if (!roomId) {
      document.getElementById('room-code-display').textContent = 'لا توجد غرفة';
      document.getElementById('loading-auth').textContent = 'رابط غير صالح.';
    } else {
      document.getElementById('room-code-display').textContent = roomId;

      // Check auth state
      getSession().then(session => {
        document.getElementById('loading-auth').classList.add('hidden');
        if (session) {
          // Already logged in, automatically proceed to dashboard to join
          location.href = `dashboard.html?join=${roomId}`;
        } else {
          // Show login buttons
          document.getElementById('auth-section').classList.remove('hidden');
        }
      });

      // Handle logins
      document.getElementById('google-login-btn').addEventListener('click', () => {
        localStorage.setItem('pending_join', roomId);
        const btn = document.getElementById('google-login-btn');
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner" style="width:22px;height:22px;border-width:3px"></div> جاري التوجيه...`;
        signInWithGoogle().catch(err => {
          btn.disabled = false;
          console.error(err);
        });
      });

      document.getElementById('guest-login-btn').addEventListener('click', () => {
        const name = document.getElementById('guest-name-input').value.trim();
        if (!name) {
          showToast('يرجى كتابة اسمك أولاً للدخول كضيف', 'error');
          return;
        }

        localStorage.setItem('pending_join', roomId);
        const btn = document.getElementById('guest-login-btn');
        btn.disabled = true;
        btn.innerHTML = `<div class="spinner" style="width:18px;height:18px;border-width:3px"></div> جاري الدخول...`;
        signInAsGuest(name).catch(err => {
          btn.disabled = false;
          console.error(err);
        });
      });
    }
  </script>
</body>

</html>
